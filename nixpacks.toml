# Coolify defaults to Nixpacks; this repo is Perl/imapsync (no Node).
# The Python provider is declared so `nixpacks plan` can succeed; build phases mirror Dockerfile.

providers = ["python"]

[phases.setup]
aptPkgs = [
  "...",
  "perl",
  "libauthen-ntlm-perl",
  "libcgi-pm-perl",
  "libcrypt-openssl-rsa-perl",
  "libcrypt-openssl-pkcs12-perl",
  "libdata-uniqid-perl",
  "libencode-imaputf7-perl",
  "libfile-copy-recursive-perl",
  "libfile-tail-perl",
  "libio-compress-perl",
  "libio-socket-ssl-perl",
  "libio-socket-inet6-perl",
  "libio-tee-perl",
  "libhtml-parser-perl",
  "libjson-webtoken-perl",
  "libmail-imapclient-perl",
  "libparse-recdescent-perl",
  "libmodule-scandeps-perl",
  "libpar-packer-perl",
  "libproc-processtable-perl",
  "libreadonly-perl",
  "libregexp-common-perl",
  "libsys-meminfo-perl",
  "libterm-readkey-perl",
  "libtest-mockobject-perl",
  "libtest-pod-perl",
  "libunicode-string-perl",
  "liburi-perl",
  "libwww-perl",
  "procps",
  "python3",
  "wget",
  "make",
  "cpanminus",
  "lsof",
  "nmap",
  "openssl",
  "ca-certificates",
]

[phases.build]
cmds = [
  "cpanm IO::Socket::SSL",
  "cd /usr/bin && wget -N --no-check-certificate https://imapsync.lamiral.info/imapsync https://imapsync.lamiral.info/prerequisites_imapsync https://raw.githubusercontent.com/google/gmail-oauth2-tools/master/python/oauth2.py && chmod +x imapsync oauth2.py",
]

[start]
cmd = "sh -c 'exec python3 /app/web/serve.py'"
